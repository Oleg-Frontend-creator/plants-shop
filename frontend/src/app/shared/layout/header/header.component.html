<header class="header" [class.menu-open]="menuOpen">
  <div class="container">
    <a routerLink="/" class="logo">
      <img loading="eager" src="assets/images/logo.png" alt="Logo">
    </a>
    <div class="header-content">
      <div class="header-top">
        <nav class="header-top-menu">
          <ul>
            <li>
              <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Главная</a>
            </li>
            <li>
              <a routerLink="/catalog" routerLinkActive="active">Каталог</a>
            </li>
            <li>
              <a routerLink="/" fragment="reviews">Отзывы</a>
            </li>
            <li>
              <a routerLink="/" fragment="delivery">Доставка и оплата</a>
            </li>
          </ul>
        </nav>
        <div class="header-top-activities">
          <a class="header-top-phone" href="tel:+375299182888">
            + 375 (29) 918-28-88
          </a>
          <div class="header-top-actions">
            <a routerLink="/login" *ngIf="!isLogged">
              <svg width="23" height="23" viewBox="0 0 23 23" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M8.5293 7.24498C8.82638 3.79498 10.5993 2.38623 14.4805 2.38623H14.6051C18.8889 2.38623 20.6043 4.10165 20.6043 8.3854V14.6337C20.6043 18.9175 18.8889 20.6329 14.6051 20.6329H14.4805C10.628 20.6329 8.85513 19.2433 8.53888 15.8508"
                  stroke="#202B21" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M1.91699 11.5H14.2603" stroke="#202B21" stroke-width="1.5" stroke-linecap="round"
                      stroke-linejoin="round"/>
                <path d="M12.123 8.28955L15.3335 11.5L12.123 14.7104" stroke="#202B21" stroke-width="1.5"
                      stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </a>
            <a *ngIf="isLogged" [matMenuTriggerFor]="menu">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M12.1207 12.78C12.0507 12.77 11.9607 12.77 11.8807 12.78C10.1207 12.72 8.7207 11.28 8.7207 9.50998C8.7207 7.69998 10.1807 6.22998 12.0007 6.22998C13.8107 6.22998 15.2807 7.69998 15.2807 9.50998C15.2707 11.28 13.8807 12.72 12.1207 12.78Z"
                  stroke="#202B21" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path
                  d="M18.7398 19.3801C16.9598 21.0101 14.5998 22.0001 11.9998 22.0001C9.39977 22.0001 7.03977 21.0101 5.25977 19.3801C5.35977 18.4401 5.95977 17.5201 7.02977 16.8001C9.76977 14.9801 14.2498 14.9801 16.9698 16.8001C18.0398 17.5201 18.6398 18.4401 18.7398 19.3801Z"
                  stroke="#202B21" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path
                  d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"
                  stroke="#202B21" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </a>
            <a routerLink="/favorite" *ngIf="isLogged">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M11.9997 20.846C11.7155 20.846 11.4405 20.8093 11.2113 20.7268C7.70967 19.526 2.14551 15.2635 2.14551 8.96596C2.14551 5.75763 4.73967 3.1543 7.92967 3.1543C9.47884 3.1543 10.9272 3.7593 11.9997 4.84096C13.0722 3.7593 14.5205 3.1543 16.0697 3.1543C19.2597 3.1543 21.8538 5.7668 21.8538 8.96596C21.8538 15.2726 16.2897 19.526 12.788 20.7268C12.5588 20.8093 12.2838 20.846 11.9997 20.846Z"
                  fill="#202B21"/>
              </svg>
            </a>
            <a routerLink="/cart">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M6.32507 7.31686C6.16673 7.31686 6.00007 7.2502 5.8834 7.13353C5.64173 6.89186 5.64173 6.49186 5.8834 6.2502L8.9084 3.2252C9.15007 2.98353 9.55007 2.98353 9.79173 3.2252C10.0334 3.46686 10.0334 3.86686 9.79173 4.10853L6.76673 7.13353C6.64173 7.2502 6.4834 7.31686 6.32507 7.31686Z"
                  fill="#202B21"/>
                <path

                  fill="#202B21"/>
                <path
                  d="M18.842 10.8333H5.33366C4.75033 10.8417 4.08366 10.8417 3.60033 10.3583C3.21699 9.98333 3.04199 9.4 3.04199 8.54167C3.04199 6.25 4.71699 6.25 5.51699 6.25H18.4837C19.2837 6.25 20.9587 6.25 20.9587 8.54167C20.9587 9.40833 20.7837 9.98333 20.4003 10.3583C19.967 10.7917 19.3837 10.8333 18.842 10.8333Z"
                  fill="#202B21"/>
                <path
                  d="M14.4083 20.9581H9.38329C6.39996 20.9581 5.73329 19.1831 5.47496 17.6415L4.29996 10.4331C4.24162 10.0915 4.47496 9.7748 4.81662 9.71646C5.15829 9.65813 5.47496 9.89146 5.53329 10.2331L6.70829 17.4331C6.94996 18.9081 7.44996 19.7081 9.38329 19.7081H14.4083C16.55 19.7081 16.7916 18.9581 17.0666 17.5081L18.4666 10.2165C18.5333 9.87479 18.8583 9.6498 19.2 9.7248C19.5416 9.79146 19.7583 10.1165 19.6916 10.4581L18.2916 17.7498C17.9666 19.4415 17.425 20.9581 14.4083 20.9581Z"
                  fill="#202B21"/>
              </svg>
              <span>{{ count }}</span>
            </a>
            <mat-menu #menu="matMenu">
              <button mat-menu-item>
                <a routerLink="/profile">Профиль</a>
              </button>
              <button mat-menu-item>
                <span (click)="logout()">Выйти</span>
              </button>
            </mat-menu>
          </div>
        </div>
      </div>
      <div class="header-bottom">
        <nav class="header-bottom-menu">
          <ul>
            <li *ngFor="let category of categories;">
              <a routerLink="/catalog" [queryParams]="{types: category?.typesUrl}">{{ category.name }}</a>
            </li>
          </ul>
        </nav>
        <div class="header-bottom-search">
          <input type="text" placeholder="Начните искать" [formControl]="searchField">
          <div class="search-products" *ngIf="showedSearch && products && products.length > 0">
            <div class="search-product" *ngFor="let product of products" (click)="selectProduct(product.url)">
              <div class="search-product-image"
                   [style.background-image]="'url(' + serverStaticPath + product.image + ')'"></div>
              <div class="search-product-name">{{ product.name }}</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Burger button (mobile only) -->
    <button class="burger" (click)="toggleMenu()" [class.open]="menuOpen" aria-label="Меню">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile drawer -->
  <div class="mobile-menu" [class.open]="menuOpen" (click)="closeMenu()">
    <div class="mobile-menu-inner" (click)="$event.stopPropagation()">
      <nav class="mobile-nav">
        <a routerLink="/" (click)="closeMenu()">Главная</a>
        <a routerLink="/catalog" (click)="closeMenu()">Каталог</a>
        <a routerLink="/" fragment="delivery" (click)="closeMenu()">Доставка и оплата</a>
        <a routerLink="/" fragment="reviews" (click)="closeMenu()">Отзывы</a>
        <hr *ngIf="categories.length > 0">
        <a *ngFor="let category of categories" routerLink="/catalog"
           [queryParams]="{types: category?.typesUrl}" (click)="closeMenu()">
          {{ category.name }}
        </a>
      </nav>
      <div class="mobile-menu-footer">
        <a class="mobile-phone" href="tel:+375299182888">+ 375 (29) 918-28-88</a>
        <div class="mobile-actions">

          <!-- Не авторизован -->
          <a routerLink="/login" *ngIf="!isLogged" (click)="closeMenu()" class="mobile-action-btn mobile-action-btn--primary">
            <svg width="18" height="18" viewBox="0 0 23 23" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8.5293 7.24498C8.82638 3.79498 10.5993 2.38623 14.4805 2.38623H14.6051C18.8889 2.38623 20.6043 4.10165 20.6043 8.3854V14.6337C20.6043 18.9175 18.8889 20.6329 14.6051 20.6329H14.4805C10.628 20.6329 8.85513 19.2433 8.53888 15.8508" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M1.91699 11.5H14.2603" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12.123 8.28955L15.3335 11.5L12.123 14.7104" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Войти в аккаунт
          </a>

          <!-- Авторизован -->
          <ng-container *ngIf="isLogged">
            <div class="mobile-actions-group">
              <a routerLink="/profile" (click)="closeMenu()" class="mobile-action-item">
                <span class="mobile-action-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12.1207 12.78C12.0507 12.77 11.9607 12.77 11.8807 12.78C10.1207 12.72 8.7207 11.28 8.7207 9.50998C8.7207 7.69998 10.1807 6.22998 12.0007 6.22998C13.8107 6.22998 15.2807 7.69998 15.2807 9.50998C15.2707 11.28 13.8807 12.72 12.1207 12.78Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M18.7398 19.3801C16.9598 21.0101 14.5998 22.0001 11.9998 22.0001C9.39977 22.0001 7.03977 21.0101 5.25977 19.3801C5.35977 18.4401 5.95977 17.5201 7.02977 16.8001C9.76977 14.9801 14.2498 14.9801 16.9698 16.8001C18.0398 17.5201 18.6398 18.4401 18.7398 19.3801Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
                <span class="mobile-action-label">Профиль</span>
                <svg class="mobile-action-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M5.44 1C5.6 1 5.75 1.06 5.88 1.18L11.19 6.44C12.05 7.3 12.05 8.7 11.19 9.56L5.88 14.82C5.64 15.06 5.25 15.06 5.01 14.82C4.78 14.59 4.78 14.2 5.01 13.97L10.32 8.7C10.71 8.32 10.71 7.68 10.32 7.3L5.01 2.03C4.78 1.8 4.78 1.41 5.01 1.18C5.13 1.06 5.29 1 5.44 1Z" fill="currentColor"/>
                </svg>
              </a>
              <a routerLink="/favorite" (click)="closeMenu()" class="mobile-action-item">
                <span class="mobile-action-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M11.9997 20.846C11.7155 20.846 11.4405 20.8093 11.2113 20.7268C7.70967 19.526 2.14551 15.2635 2.14551 8.96596C2.14551 5.75763 4.73967 3.1543 7.92967 3.1543C9.47884 3.1543 10.9272 3.7593 11.9997 4.84096C13.0722 3.7593 14.5205 3.1543 16.0697 3.1543C19.2597 3.1543 21.8538 5.7668 21.8538 8.96596C21.8538 15.2726 16.2897 19.526 12.788 20.7268C12.5588 20.8093 12.2838 20.846 11.9997 20.846Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
                <span class="mobile-action-label">Избранное</span>
                <svg class="mobile-action-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M5.44 1C5.6 1 5.75 1.06 5.88 1.18L11.19 6.44C12.05 7.3 12.05 8.7 11.19 9.56L5.88 14.82C5.64 15.06 5.25 15.06 5.01 14.82C4.78 14.59 4.78 14.2 5.01 13.97L10.32 8.7C10.71 8.32 10.71 7.68 10.32 7.3L5.01 2.03C4.78 1.8 4.78 1.41 5.01 1.18C5.13 1.06 5.29 1 5.44 1Z" fill="currentColor"/>
                </svg>
              </a>
            </div>
            <a class="mobile-action-btn mobile-action-btn--outline" (click)="logout(); closeMenu()">
              <svg width="18" height="18" viewBox="0 0 23 23" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M14.4707 7.24498C14.1736 3.79498 12.4007 2.38623 8.51953 2.38623H8.39492C4.11117 2.38623 2.39575 4.10165 2.39575 8.3854V14.6337C2.39575 18.9175 4.11117 20.6329 8.39492 20.6329H8.51953C12.372 20.6329 14.1449 19.2433 14.4611 15.8508" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M21.083 11.5H8.73975" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M18.877 8.28955L22.0835 11.5L18.877 14.7104" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Выйти
            </a>
          </ng-container>

          <!-- Корзина — всегда видна -->
          <a routerLink="/cart" (click)="closeMenu()" class="mobile-action-cart">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M6.32507 7.31686C6.16673 7.31686 6.00007 7.2502 5.8834 7.13353C5.64173 6.89186 5.64173 6.49186 5.8834 6.2502L8.9084 3.2252C9.15007 2.98353 9.55007 2.98353 9.79173 3.2252C10.0334 3.46686 10.0334 3.86686 9.79173 4.10853L6.76673 7.13353C6.64173 7.2502 6.4834 7.31686 6.32507 7.31686Z" fill="currentColor"/>
              <path d="M17.6753 7.31686C17.5169 7.31686 17.3586 7.25853 17.2336 7.13353L14.2086 4.10853C13.9669 3.86686 13.9669 3.46686 14.2086 3.2252C14.4503 2.98353 14.8503 2.98353 15.0919 3.2252L18.1169 6.2502C18.3586 6.49186 18.3586 6.89186 18.1169 7.13353C18.0003 7.2502 17.8336 7.31686 17.6753 7.31686Z" fill="currentColor"/>
              <path d="M18.842 10.8333H5.33366C4.75033 10.8417 4.08366 10.8417 3.60033 10.3583C3.21699 9.98333 3.04199 9.4 3.04199 8.54167C3.04199 6.25 4.71699 6.25 5.51699 6.25H18.4837C19.2837 6.25 20.9587 6.25 20.9587 8.54167C20.9587 9.40833 20.7837 9.98333 20.4003 10.3583C19.967 10.7917 19.3837 10.8333 18.842 10.8333Z" fill="currentColor"/>
              <path d="M14.4083 20.9581H9.38329C6.39996 20.9581 5.73329 19.1831 5.47496 17.6415L4.29996 10.4331C4.24162 10.0915 4.47496 9.7748 4.81662 9.71646C5.15829 9.65813 5.47496 9.89146 5.53329 10.2331L6.70829 17.4331C6.94996 18.9081 7.44996 19.7081 9.38329 19.7081H14.4083C16.55 19.7081 16.7916 18.9581 17.0666 17.5081L18.4666 10.2165C18.5333 9.87479 18.8583 9.6498 19.2 9.7248C19.5416 9.79146 19.7583 10.1165 19.6916 10.4581L18.2916 17.7498C17.9666 19.4415 17.425 20.9581 14.4083 20.9581Z" fill="currentColor"/>
            </svg>
            <span class="mobile-cart-label">Корзина</span>
            <span class="mobile-cart-badge" *ngIf="count > 0">{{ count }}</span>
          </a>

        </div>
        <div class="mobile-bottom-search">
          <input type="text" placeholder="Начните искать" [formControl]="searchField">
          <div class="search-products search-products-up" *ngIf="showedSearch && products && products.length > 0">
            <div class="search-product" *ngFor="let product of products" (click)="selectProduct(product.url)">
              <div class="search-product-image"
                   [style.background-image]="'url(' + serverStaticPath + product.image + ')'"></div>
              <div class="search-product-name">{{ product.name }}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- Overlay -->
<div class="menu-overlay" [class.visible]="menuOpen" (click)="closeMenu()"></div>
